<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lucksta IF Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }

    /* Floating button */
    #chat-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #f5c800;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Chat window */
    #chat-window {
      position: fixed;
      bottom: 96px;
      right: 24px;
      width: 340px;
      max-height: 520px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.22);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 9999;
    }
    #chat-window.hidden { display: none; }

    /* Header */
    #chat-header {
      background: #f5c800;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    #chat-logo {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 0.9rem; color: #fff;
    }
    #chat-header-text { flex: 1; }
    #chat-header-text strong { display: block; color: #fff; font-size: 1rem; }
    #chat-header-text span { color: rgba(255,255,255,0.85); font-size: 0.72rem; }
    #close-btn {
      background: rgba(255,255,255,0.2);
      border: none; border-radius: 50%;
      width: 28px; height: 28px;
      color: #fff; font-size: 1.1rem;
      cursor: pointer;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      background: #f9f9f9;
    }
    .msg {
      max-width: 82%;
      padding: 0.65rem 0.9rem;
      font-size: 0.84rem;
      line-height: 1.5;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .msg.bot {
      background: #fff;
      border-radius: 14px 14px 14px 4px;
      align-self: flex-start;
      color: #1a1a1a;
    }
    .msg.user {
      background: #f5c800;
      border-radius: 14px 14px 4px 14px;
      align-self: flex-end;
      color: #fff;
    }

    /* Quick buttons */
    #quick-buttons { display: flex; flex-direction: column; gap: 0.5rem; }
    .quick-btn {
      display: flex; align-items: center; justify-content: space-between;
      background: #fffbea; border: 1px solid #f0e0a0;
      border-radius: 10px; padding: 0.7rem 1rem;
      cursor: pointer; font-size: 0.87rem; color: #1a1a1a;
      width: 100%; text-align: left;
    }
    .quick-btn:hover { background: #fff3c4; }

    /* Typing indicator */
    #typing { display: none; gap: 5px; padding: 0.4rem 0; align-self: flex-start; }
    #typing span {
      width: 8px; height: 8px; border-radius: 50%;
      background: #f5c800; opacity: 0.7;
      animation: bounce 1.1s infinite;
    }
    #typing span:nth-child(2) { animation-delay: 0.18s; }
    #typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* Input */
    #input-area {
      padding: 0.75rem;
      border-top: 1px solid #eee;
      display: flex; gap: 0.5rem;
      background: #fff;
    }
    #user-input {
      flex: 1; border: 1px solid #ddd;
      border-radius: 20px; padding: 0.55rem 1rem;
      font-size: 0.85rem; outline: none;
      background: #f5f5f5; color: #333;
    }
    #send-btn {
      width: 38px; height: 38px;
      border-radius: 50%; background: #f5c800;
      border: none; color: #fff;
      font-size: 1rem; cursor: pointer;
      flex-shrink: 0;
    }

    /* Status bar */
    #status { font-size: 0.72rem; color: #999; padding: 0.3rem 1rem; background: #f9f9f9; text-align: center; }
  </style>
</head>
<body>

<!-- Floating button -->
<button id="chat-btn" onclick="toggleChat()">💬</button>

<!-- Chat window -->
<div id="chat-window" class="hidden">
  <div id="chat-header">
    <div id="chat-logo">LIF</div>
    <div id="chat-header-text">
      <strong>Lucksta IF</strong>
      <span>Hej! Hur kan jag hjälpa dig? 👋</span>
    </div>
    <button id="close-btn" onclick="toggleChat()">×</button>
  </div>

  <div id="status">Laddar föreningsinformation...</div>

  <div id="messages">
    <div class="msg bot">Hej! 👋 Jag är Lucksta IF:s chattbot. Vad kan jag hjälpa dig med?</div>
    <div id="quick-buttons">
      <button class="quick-btn" onclick="send('Träningstider')">⚽ Träningstider <span>›</span></button>
      <button class="quick-btn" onclick="send('Bli medlem')">🧑 Bli medlem <span>›</span></button>
      <button class="quick-btn" onclick="send('Kommande matcher')">📅 Kommande matcher <span>›</span></button>
      <button class="quick-btn" onclick="send('Kontakta oss')">📞 Kontakta oss <span>›</span></button>
    </div>
    <div id="typing"><span></span><span></span><span></span></div>
  </div>

  <div id="input-area">
    <input id="user-input" placeholder="Ställ en fråga..." onkeydown="if(event.key==='Enter') send()"/>
    <button id="send-btn" onclick="send()">➤</button>
  </div>
</div>

<script>
  let clubInfo = "";
  let messages = [];
  let loading = false;

  // Fetch club info from our own API on load
  async function loadClubInfo() {
    try {
      const res = await fetch("/api/fetch-club");
      const data = await res.json();
      if (data.content) {
        clubInfo = data.content;
        document.getElementById("status").textContent = "✓ Föreningsinformation laddad";
        setTimeout(() => document.getElementById("status").style.display = "none", 3000);
      }
    } catch(e) {
      document.getElementById("status").textContent = "Kunde inte ladda föreningsinformation";
    }
  }

  function toggleChat() {
    const w = document.getElementById("chat-window");
    const btn = document.getElementById("chat-btn");
    w.classList.toggle("hidden");
    btn.textContent = w.classList.contains("hidden") ? "💬" : "×";
  }

  function addMessage(text, role) {
    const qb = document.getElementById("quick-buttons");
    if (qb) qb.remove();

    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "bot");
    div.textContent = text;
    const msgs = document.getElementById("messages");
    msgs.insertBefore(div, document.getElementById("typing"));
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  async function send(text) {
    const input = document.getElementById("user-input");
    const msg = text || input.value.trim();
    if (!msg || loading) return;
    input.value = "";
    loading = true;

    addMessage(msg, "user");
    messages.push({ role: "user", content: msg });

    const typing = document.getElementById("typing");
    typing.style.display = "flex";

    try {
      const systemPrompt = "Du är en hjälpsam assistent för idrottsföreningen Lucksta IF. Svara alltid kort och vänligt på svenska." +
        (clubInfo ? "\n\nHär är aktuell information från föreningens hemsida:\n" + clubInfo : "\nOm du inte vet svaret, hänvisa till att kontakta föreningen direkt.");

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 500,
          system: systemPrompt,
          messages: messages
        })
      });

      const data = await res.json();
      typing.style.display = "none";

      if (data.error) {
        addMessage("Fel: " + data.error.message, "bot");
      } else {
        const reply = data?.content?.[0]?.text || "Kunde inte svara just nu.";
        addMessage(reply, "bot");
        messages.push({ role: "assistant", content: reply });
      }
    } catch(e) {
      typing.style.display = "none";
      addMessage("Något gick fel. Försök igen!", "bot");
    }

    loading = false;
  }

  loadClubInfo();
</script>
</body>
</html>
